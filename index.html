    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }

            /* ✅ REAL TORNADO SHAPES — EXACTLY LIKE 🌪️ */
            .tornado-cone {
                clip-path: polygon(
                    45% 0%, 55% 0%,
                    75% 20%, 82% 50%, 80% 85%, 70% 100%,
                    30% 100%, 20% 85%, 18% 50%, 25% 20%
                );
            }
            .tornado-rope {
                clip-path: polygon(
                    48% 0%, 52% 0%,
                    60% 30%, 63% 60%, 60% 90%, 55% 100%,
                    45% 100%, 40% 90%, 37% 60%, 40% 30%
                );
            }
            .tornado-wedge {
                clip-path: polygon(
                    42% 0%, 58% 0%,
                    80% 15%, 90% 45%, 92% 80%, 85% 100%,
                    15% 100%, 8% 80%, 10% 45%, 20% 15%
                );
            }
            .tornado-multi {
                clip-path: polygon(
                    44% 0%, 56% 0%,
                    78% 18%, 86% 48%, 88% 82%, 78% 100%,
                    22% 100%, 12% 82%, 14% 48%, 22% 18%
                );
            }
            .tornado-satellite {
                clip-path: polygon(
                    47% 0%, 53% 0%,
                    68% 22%, 74% 52%, 72% 84%, 65% 100%,
                    35% 100%, 28% 84%, 26% 52%, 32% 22%
                );
            }
            .tornado-fire {
                clip-path: polygon(
                    45% 0%, 55% 0%,
                    72% 25%, 78% 55%, 75% 88%, 68% 100%,
                    32% 100%, 25% 88%, 22% 55%, 28% 25%
                );
            }
            .tornado-waterspout {
                clip-path: polygon(
                    46% 0%, 54% 0%,
                    66% 28%, 71% 58%, 68% 88%, 62% 100%,
                    38% 100%, 32% 88%, 29% 58%, 34% 28%
                );
            }

            /* ✅ REAL SPINNING SYSTEM — FAST, CHAOTIC, REALISTIC */
            .spin-slow { animation: spin 12s linear infinite; }
            .spin-medium { animation: spin 7s linear infinite; }
            .spin-fast { animation: spin 4s linear infinite; }
            .spin-extreme { animation: spin 2.5s linear infinite; }

            /* ✅ MOVEMENT & SWIRL — LIKE REAL WIND */
            .swirl-gentle { animation: sway 6s ease-in-out infinite alternate; }
            .swirl-wild { animation: sway 2.8s ease-in-out infinite alternate; }
            .pulse-storm { animation: pulse 3s ease-in-out infinite; }
            .rise-dust { animation: rise 2s linear infinite; }
            .water-flow { animation: wave 3.5s ease-in-out infinite alternate; }

            @keyframes spin {
                0% { transform: rotate(0deg) scale(1); }
                25% { transform: rotate(90deg) scale(1.02); }
                50% { transform: rotate(180deg) scale(1); }
                75% { transform: rotate(270deg) scale(0.98); }
                100% { transform: rotate(360deg) scale(1); }
            }
            @keyframes sway {
                0% { transform: translateX(-4%) rotate(2deg) skewY(1deg); }
                100% { transform: translateX(4%) rotate(-2deg) skewY(-1deg); }
            }
            @keyframes pulse {
                0%,100% { opacity: 0.8; transform: scale(1); }
                50% { opacity: 1; transform: scale(1.03); }
            }
            @keyframes rise {
                0% { transform: translateY(15px) scale(0.3); opacity: 0.6; }
                100% { transform: translateY(-150px) scale(1.2); opacity: 0; }
            }
            @keyframes wave {
                0% { transform: skewX(-3deg); }
                100% { transform: skewX(3deg); }
            }

            /* ✅ LAYERS FOR DEPTH — LOOKS 3D */
            .tornado-layer {
                position: absolute;
                width: 100%;
                height: 100%;
                mix-blend-mode: screen;
                filter: blur(1px);
            }
            .core {
                position: absolute;
                width: 40%;
                height: 100%;
                left: 30%;
                background: radial-gradient(ellipse at center, rgba(255,255,255,0.9) 0%, rgba(180,180,180,0.4) 70%, transparent 100%);
                filter: blur(2px);
            }
            .dust-particle {
                position: absolute;
                border-radius: 50%;
                opacity: 0.7;
            }
            .lightning-bolt {
                position: absolute;
                width: 3px;
                background: white;
                filter: blur(1px) brightness(2);
                opacity: 0;
            }
        }
    </style>
</head>

        // CREATE DEBRIS / DUST / SPARKS
        function makeDebris(type, count) {
            const el = document.getElementById('debris-field');
            el.innerHTML = '';
            let color, sizeMin, sizeMax;
            if (type === 'dirt') { color = '#B88646'; sizeMin = 2; sizeMax = 10; }
            if (type === 'water') { color = '#FFFFFF'; sizeMin = 1; sizeMax = 6; }
            if (type === 'fire') { color = '#FF9900'; sizeMin = 3; sizeMax = 12; }

            for (let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.classList.add('dust-particle', 'rise-dust');
                p.style.width = `${Math.random() * sizeMax + sizeMin}px`;
                p.style.height = p.style.width;
                p.style.left = `${Math.random() * 100}%`;
                p.style.bottom = '0';
                p.style.background = color;
                p.style.boxShadow = type === 'fire' ? '0 0 8px #FF6600' : 'none';
                p.style.animationDelay = `${Math.random() * 2.5}s`;
                el.appendChild(p);
            }
        }

        // LIGHTNING EFFECT
        function strikeLightning() {
            const g = document.getElementById('lightning-group');
            const b = document.createElement('div');
            b.className = 'lightning-bolt';
            b.style.left = `${Math.random()*80+10}%`;
            b.style.top = `${Math.random()*50+10}%`;
            b.style.height = `${Math.random()*100+50}px`;
            b.style.opacity = 1;
            g.appendChild(b);
            setTimeout(() => b.style.opacity = 0, 120);
            setTimeout(() => b.remove(), 300);
        }

        // RAIN EFFECT
        function makeRain(show) {
            const r = document.getElementById('rain-drops');
            r.innerHTML = '';
            if (!show) return;
            for (let i=0; i<200; i++) {
                const d = document.createElement('div');
                d.style.position = 'absolute';
                d.style.width = '1px';
                d.style.height = `${Math.random()*20+5}px`;
                d.style.background = 'rgba(255,255,255,0.25)';
                d.style.left = `${Math.random()*100}%`;
                d.style.top = `${Math.random()*100}%`;
                d.style.animation = 'rise 1.2s linear infinite';
                d.style.animationDelay = `${Math.random()}s`;
                r.appendChild(d);
            }
            r.style.opacity = 0.7;
        }

        // ✅ MAIN SWITCH FUNCTION
        function pickTornado(type) {
            // RESET BUTTONS
            document.querySelectorAll('.tornado-btn').forEach(btn => {
                btn.classList.remove('border-skyLight', 'scale-105', 'shadow-[0_0_25px_rgba(135,206,235,0.5)]');
            });
            document.getElementById(`btn-${type}`).classList.add('border-skyLight', 'scale-105', 'shadow-[0_0_25px_rgba(135,206,235,0.5)]');

            const d = tornadoData[type];

            // UPDATE SHAPE & SIZE
            const tor = document.getElementById('tornado');
            tor.className = `origin-bottom transition-all duration-1000 opacity-100 ${d.shape}`;
            tor.style.width = d.width;
            tor.style.height = d.height;

            // UPDATE SPIN & MOVEMENT
            const layers = tor.querySelectorAll('.tornado-layer, .core');
            layers.forEach(l => l.className = `tornado-layer ${d.spin} ${d.move}`);

            // UPDATE COLORS
            layers[0].style.background = `linear-gradient(180deg, ${d.colorScheme.main} 0%, ${d.colorScheme.main}88 40%, ${d.colorScheme.main}BB 100%)`;
            layers[1].style.background = `linear-gradient(180deg, ${d.colorScheme.mid} 0%, ${d.colorScheme.mid}77 50%, ${d.colorScheme.main}99 100%)`;
            layers[2].style.background = `linear-gradient(180deg, ${d.colorScheme.core} 0%, ${d.colorScheme.core}66 60%, ${d.colorScheme.main}88 100%)`;
            tor.querySelector('.core').style.background = `radial-gradient(ellipse at center, ${d.colorScheme.core}DD 0%, ${d.colorScheme.main}66 70%, transparent 100%)`;

            // UPDATE SKY & GROUND
            document.getElementById('sky').className = `absolute top-0 left-0 w-full h-3/4 bg-gradient-to-b ${d.sky} transition-all duration-1000`;
            document.getElementById('ground').className = `absolute bottom-0 left-0 w-full h-1/4 bg-gradient-to-t ${d.ground} transition-all duration-1000`;

            // SHOW/HIDE EXTRA TORNADOS
            document.getElementById('sub-tornados').style.opacity = type === 'multi' ? 1 : 0;
            document.getElementById('satellite-tornado').style.opacity = type === 'satellite' ? 1 : 0;

            // EFFECTS
            const e = d.effects;
            document.getElementById('debris-field').style.opacity = 1;
            makeDebris(e.debris, e.fire ? 60 : 40);
            makeRain(e.rain);

            if (e.lightning) {
                if (window.lightTimer) clearInterval(window.lightTimer);
                window.lightTimer = setInterval(strikeLightning, Math.random()*3000 + 1000);
            } else {
                if (window.lightTimer) clearInterval(window.lightTimer);
            }

            // UPDATE INFO
            document.getElementById('tornado-title').textContent = d.title;
            document.getElementById('tornado-desc').textContent = d.description;
            const steps = document.getElementById('formation-steps');
            steps.innerHTML = '';
            d.steps.forEach(s => {
                const p = document.createElement('p');
                p.className = 'text-gray-100 flex items-start gap-2';
                p.innerHTML = `<span class="text-skyLight font-bold">✓</span> ${s}`;
                steps.appendChild(p);
            });
        }

        // START WITH CLASSIC CONE
        pickTornado('cone');
    </script>
</body>
</html>
