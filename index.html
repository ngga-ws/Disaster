<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tornado Formation Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sky: '#87CEEB',
                        storm: '#4A5568',
                        dirt: '#8B4513',
                        funnel: '#D3D3D3',
                        supercell: '#2C3E50'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .tornado-path {
                clip-path: polygon(45% 0%, 55% 0%, 70% 100%, 30% 100%);
            }
            .rotate-slow {
                animation: rotate 8s linear infinite;
            }
            .rotate-medium {
                animation: rotate 5s linear infinite;
            }
            .rotate-fast {
                animation: rotate 3s linear infinite;
            }
            .swirl {
                animation: swirl 4s ease-in-out infinite alternate;
            }
            @keyframes rotate {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
            @keyframes swirl {
                0% { transform: translateX(-5%) rotate(2deg); }
                100% { transform: translateX(5%) rotate(-2deg); }
            }
            .dust-particle {
                position: absolute;
                background-color: #A0522D;
                border-radius: 50%;
                opacity: 0.7;
                animation: rise 3s linear infinite;
            }
            @keyframes rise {
                0% { transform: translateY(20px) scale(0.5); opacity: 0.4; }
                100% { transform: translateY(-100px) scale(1); opacity: 0; }
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-storm/80 backdrop-blur-md py-4 px-6 shadow-lg">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-[clamp(1.8rem,4vw,3rem)] font-bold text-white flex items-center gap-3">
                <i class="fa fa-tornado text-blue-300"></i>
                Tornado Formation Simulator
            </h1>
            <p class="text-gray-300 text-sm md:text-base mt-2 md:mt-0">See how different tornadoes form and behave</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8">
        <!-- Controls -->
        <div class="bg-storm/40 rounded-xl p-6 mb-8 shadow-xl">
            <h2 class="text-xl font-semibold mb-4">Choose Tornado Type</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <button onclick="selectTornado('supercell')" id="btn-supercell" class="tornado-btn bg-supercell/70 hover:bg-supercell border-2 border-transparent hover:border-blue-400 rounded-lg p-3 transition-all">
                    <span class="block font-bold">Supercell Tornado</span>
                    <span class="text-xs text-gray-300">Strongest, most destructive</span>
                </button>
                <button onclick="selectTornado('landspout')" id="btn-landspout" class="tornado-btn bg-supercell/70 hover:bg-supercell border-2 border-transparent hover:border-blue-400 rounded-lg p-3 transition-all">
                    <span class="block font-bold">Landspout</span>
                    <span class="text-xs text-gray-300">Weak, narrow, rope-like</span>
                </button>
                <button onclick="selectTornado('waterspout')" id="btn-waterspout" class="tornado-btn bg-supercell/70 hover:bg-supercell border-2 border-transparent hover:border-blue-400 rounded-lg p-3 transition-all">
                    <span class="block font-bold">Waterspout</span>
                    <span class="text-xs text-gray-300">Forms over water</span>
                </button>
                <button onclick="selectTornado('multiple-vortex')" id="btn-multiple-vortex" class="tornado-btn bg-supercell/70 hover:bg-supercell border-2 border-transparent hover:border-blue-400 rounded-lg p-3 transition-all">
                    <span class="block font-bold">Multiple-Vortex</span>
                    <span class="text-xs text-gray-300">Smaller funnels inside main</span>
                </button>
            </div>
        </div>

        <!-- Simulation Area -->
        <div class="relative w-full h-[500px] bg-sky/30 rounded-xl overflow-hidden shadow-2xl mb-8">
            <!-- Sky & Clouds -->
            <div id="sky" class="absolute top-0 left-0 w-full h-3/4 bg-gradient-to-b from-sky to-gray-700 transition-all duration-1000">
                <div id="clouds" class="absolute w-full h-full overflow-hidden">
                    <!-- Cloud layers will be added via JS -->
                </div>
            </div>

            <!-- Ground -->
            <div id="ground" class="absolute bottom-0 left-0 w-full h-1/4 bg-dirt/80 transition-all duration-1000"></div>

            <!-- Tornado Container -->
            <div id="tornado-container" class="absolute bottom-[25%] left-1/2 -translate-x-1/2 w-full h-[75%] flex justify-center items-end">
                <div id="tornado" class="tornado-path w-20 origin-bottom transition-all duration-700 opacity-0">
                    <!-- Tornado layers -->
                    <div class="relative w-full h-full rotate-medium">
                        <div class="absolute w-full h-full bg-funnel/90"></div>
                        <div class="absolute w-[80%] h-full left-[10%] bg-funnel/80"></div>
                        <div class="absolute w-[60%] h-full left-[20%] bg-funnel/70"></div>
                        <div class="absolute w-[40%] h-full left-[30%] bg-funnel/60"></div>
                    </div>
                </div>

                <!-- Multiple Vortex Add-ons -->
                <div id="sub-vortices" class="absolute bottom-0 w-full h-full opacity-0">
                    <div class="absolute bottom-0 left-[40%] w-8 h-40 tornado-path rotate-fast bg-gray-400/80 origin-bottom"></div>
                    <div class="absolute bottom-0 left-[55%] w-6 h-32 tornado-path rotate-fast bg-gray-400/70 origin-bottom"></div>
                </div>
            </div>

            <!-- Dust & Debris -->
            <div id="debris-field" class="absolute bottom-[25%] left-1/2 -translate-x-1/2 w-40 h-20 opacity-0">
                <!-- Dust particles added via JS -->
            </div>

            <!-- Lightning -->
            <div id="lightning" class="absolute top-1/4 left-1/2 -translate-x-1/2 w-1 h-20 bg-white opacity-0"></div>
        </div>

        <!-- Information Panel -->
        <div id="info-panel" class="bg-storm/40 rounded-xl p-6 shadow-xl transition-all">
            <h2 id="tornado-title" class="text-2xl font-bold mb-2">Select a Tornado Type</h2>
            <p id="tornado-desc" class="text-gray-200 mb-4">Choose an option above to see how it forms and learn about its characteristics.</p>
            <div id="formation-steps" class="space-y-2 text-sm">
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-storm/80 py-4 text-center text-gray-400 text-sm">
        <p>© 2026 Tornado Formation Simulator | Educational Tool</p>
    </footer>

    <!-- Script -->
    <script>
        const tornadoData = {
            supercell: {
                title: "Supercell Tornado",
                description: "The strongest and most dangerous type of tornado, born from a rotating thunderstorm called a supercell. These can last for hours and produce winds over 300 mph.",
                animation: {
                    width: "12rem",
                    height: "28rem",
                    rotation: "rotate-medium",
                    skyColor: "from-sky to-gray-800",
                    groundColor: "bg-dirt",
                    showLightning: true,
                    showDebris: true,
                    opacity: 1
                },
                steps: [
                    "1. Warm, moist air meets cool, dry air, creating instability.",
                    "2. Wind shear creates horizontal rotation in the lower atmosphere.",
                    "3. Updrafts tilt the rotation upward, forming a mesocyclone.",
                    "4. A rear-flank downdraft brings air down, tightening the rotation.",
                    "5. The funnel cloud descends and touches the ground — tornado formed!"
                ]
            },
            landspout: {
                title: "Landspout Tornado",
                description: "A weaker, rope-like tornado that forms from growing cumulus clouds, not from a rotating supercell. Usually short-lived and less destructive.",
                animation: {
                    width: "4rem",
                    height: "22rem",
                    rotation: "rotate-slow",
                    skyColor: "from-sky to-gray-600",
                    groundColor: "bg-dirt/70",
                    showLightning: false,
                    showDebris: true,
                    opacity: 0.9
                },
                steps: [
                    "1. Warm air rises and creates a developing cloud.",
                    "2. Near-ground winds create a small area of spin.",
                    "3. Updrafts stretch this rotation upward into the cloud.",
                    "4. A narrow funnel forms but remains weak.",
                    "5. Touches ground briefly then dissipates quickly."
                ]
            },
            waterspout: {
                title: "Waterspout Tornado",
                description: "A tornado that forms over water or moves from land to water. Most are weak, but some can be strong enough to damage boats or coastal areas.",
                animation: {
                    width: "6rem",
                    height: "24rem",
                    rotation: "rotate-slow",
                    skyColor: "from-sky to-blue-700/50",
                    groundColor: "bg-blue-600/60",
                    showLightning: false,
                    showDebris: false,
                    opacity: 0.95
                },
                steps: [
                    "1. Cool air moves over warm water, creating instability.",
                    "2. Small wind shifts create gentle rotation near the surface.",
                    "3. Updrafts pull the rotating air upward.",
                    "4. Condensation forms a funnel that draws up water spray.",
                    "5. Moves slowly; usually dissipates quickly over land."
                ]
            },
            "multiple-vortex": {
                title: "Multiple-Vortex Tornado",
                description: "A tornado with two or more small, intense funnels (sub-vortices) spinning inside the main circulation. These produce the most extreme damage paths.",
                animation: {
                    width: "14rem",
                    height: "30rem",
                    rotation: "rotate-fast",
                    skyColor: "from-sky to-gray-900",
                    groundColor: "bg-dirt",
                    showLightning: true,
                    showDebris: true,
                    opacity: 1
                },
                steps: [
                    "1. Same supercell formation as strong tornadoes.",
                    "2. Very strong rotation creates shear within the funnel.",
                    "3. Smaller pockets of rotation break off inside the main vortex.",
                    "4. These sub-vortices spin rapidly around the center.",
                    "5. Creates narrow, intense swaths of destruction."
                ]
            }
        };

        // Generate dust particles
        function createDebris() {
            const debris = document.getElementById('debris-field');
            debris.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('dust-particle');
                particle.style.width = `${Math.random() * 6 + 2}px`;
                particle.style.height = particle.style.width;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 2}s`;
                debris.appendChild(particle);
            }
        }

        createDebris();

        // Lightning flash effect
        function flashLightning() {
            const lightning = document.getElementById('lightning');
            lightning.style.opacity = 1;
            setTimeout(() => lightning.style.opacity = 0, 100);
        }

        // Select tornado function
        function selectTornado(type) {
            // Reset buttons
            document.querySelectorAll('.tornado-btn').forEach(btn => btn.classList.remove('border-blue-400', 'bg-supercell/90'));
            document.getElementById(`btn-${type}`).classList.add('border-blue-400', 'bg-supercell/90');

            const data = tornadoData[type];
            const anim = data.animation;

            // Update visuals
            const sky = document.getElementById('sky');
            sky.className = sky.className.replace(/from-sky to-\S+/, `from-sky ${anim.skyColor}`);

            const ground = document.getElementById('ground');
            ground.className = ground.className.replace(/bg-\S+/, anim.groundColor);

            const tornado = document.getElementById('tornado');
            tornado.style.width = anim.width;
            tornado.style.height = anim.height;
            tornado.className = `tornado-path origin-bottom transition-all duration-700 ${anim.rotation} swirl`;
            tornado.style.opacity = anim.opacity;

            // Sub-vortices
            const subVortices = document.getElementById('sub-vortices');
            subVortices.style.opacity = type === 'multiple-vortex' ? 1 : 0;

            // Debris
            document.getElementById('debris-field').style.opacity = anim.showDebris ? 0.8 : 0;

            // Lightning
            if (anim.showLightning) {
                if (window.lightningInterval) clearInterval(window.lightningInterval);
                window.lightningInterval = setInterval(flashLightning, Math.random() * 3000 + 2000);
            } else {
                if (window.lightningInterval) clearInterval(window.lightningInterval);
                document.getElementById('lightning').style.opacity = 0;
            }

            // Update info panel
            document.getElementById('tornado-title').textContent = data.title;
            document.getElementById('tornado-desc').textContent = data.description;

            const stepsEl = document.getElementById('formation-steps');
            stepsEl.innerHTML = '';
            data.steps.forEach(step => {
                const p = document.createElement('p');
                p.textContent = step;
                stepsEl.appendChild(p);
            });
        }

        // Initialize with supercell
        selectTornado('supercell');
    </script>
</body>
</html>
